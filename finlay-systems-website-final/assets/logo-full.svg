<svg width="480" height="200" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Finlay Systems logo</title>
<desc>Logo lockup: an "F" icon mark made of connected nodes, next to the wordmark Finlay Systems.</desc>
<g fill="none" stroke="#4A5A68" stroke-width="12" stroke-linecap="round">
  <line x1="70" y1="30" x2="70" y2="150"/>
  <line x1="70" y1="30" x2="140" y2="30"/>
  <line x1="70" y1="80" x2="120" y2="80"/>
</g>
<circle cx="70" cy="30" r="11" fill="#1B2A38" stroke="#FFFFFF" stroke-width="3"/>
<circle cx="70" cy="80" r="11" fill="#9F6130" stroke="#FFFFFF" stroke-width="3"/>
<circle cx="70" cy="150" r="11" fill="#3E6D91" stroke="#FFFFFF" stroke-width="3"/>
<circle cx="120" cy="80" r="11" fill="#D7DEE3" stroke="#4A5A68" stroke-width="3"/>
<circle cx="140" cy="30" r="11" fill="#6B4E8E" stroke="#FFFFFF" stroke-width="3"/>
<text x="200" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="600" fill="#1B2A38">Finlay</text>
<text x="203" y="140" font-family="Arial, Helvetica, sans-serif" font-size="19" letter-spacing="6" fill="#6B4E8E">SYSTEMS</text>
</svg>
