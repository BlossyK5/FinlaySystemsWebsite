<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Finlay Systems icon mark</title>
<desc>An "F" formed from connected nodes and lines, symbolising systems integration. Each node carries a different colour from the brand palette, representing distinct systems joined into one.</desc>
<g fill="none" stroke="#4A5A68" stroke-width="16" stroke-linecap="round">
  <line x1="60" y1="40" x2="60" y2="160"/>
  <line x1="60" y1="40" x2="140" y2="40"/>
  <line x1="60" y1="95" x2="120" y2="95"/>
</g>
<circle cx="60" cy="40" r="14" fill="#1B2A38" stroke="#FFFFFF" stroke-width="4"/>
<circle cx="60" cy="95" r="14" fill="#9F6130" stroke="#FFFFFF" stroke-width="4"/>
<circle cx="60" cy="160" r="14" fill="#3E6D91" stroke="#FFFFFF" stroke-width="4"/>
<circle cx="120" cy="95" r="14" fill="#D7DEE3" stroke="#4A5A68" stroke-width="4"/>
<circle cx="140" cy="40" r="14" fill="#6B4E8E" stroke="#FFFFFF" stroke-width="4"/>
</svg>
